server:
  port: 8088

spring:
  profiles:
    active: local
  application:
    name: movie-ticket-booking
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/movieticket}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

app:
  jwt:
    # HS256 signing secret (>= 32 bytes). Override in real environments via APP_JWT_SECRET.
    secret: ${APP_JWT_SECRET:change-me-dev-secret-please-override-with-32B-minimum-value}
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:60}
  admin:
    # Default ADMIN account seeded at startup if absent. Override in real environments.
    email: ${APP_ADMIN_EMAIL:admin@movieticket.local}
    password: ${APP_ADMIN_PASSWORD:admin12345}
  hold:
    # Minutes a seat hold stays valid before it auto-expires and the seats are released.
    ttl-minutes: ${APP_HOLD_TTL_MINUTES:5}
    # How often the sweeper scans for and releases expired holds.
    sweep-interval-ms: ${APP_HOLD_SWEEP_INTERVAL_MS:60000}
  notification:
    dispatch-interval-ms: ${APP_NOTIFICATION_DISPATCH_INTERVAL_MS:10000}
    reminder-interval-ms: ${APP_NOTIFICATION_REMINDER_INTERVAL_MS:300000}
    reminder-lead-minutes: ${APP_NOTIFICATION_REMINDER_LEAD_MINUTES:60}
    max-attempts: ${APP_NOTIFICATION_MAX_ATTEMPTS:5}

logging:
  level:
    com.example.movieticket: INFO
