spring:
  application:
    name: movie-ticket-booking
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/movieticket}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

logging:
  level:
    com.example.movieticket: INFO
