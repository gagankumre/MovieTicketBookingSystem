spring:
  datasource:
    # In-memory H2 in PostgreSQL-compatibility mode for fast, isolated tests.
    url: jdbc:h2:mem:movieticket;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;LOCK_TIMEOUT=10000
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

# Effectively disable the scheduled jobs during tests; the services are invoked directly so
# expiry/dispatch/reminders stay deterministic.
app:
  hold:
    sweep-interval-ms: 3600000
  notification:
    dispatch-interval-ms: 3600000
    reminder-interval-ms: 3600000
